name: SDLC Governance UAT Deployment Pipeline

on:
  pull_request:
    types: [opened, reopened, closed, synchronize]
    branches: [uat]
  workflow_dispatch:
    inputs:
      manual_multi_deployments_json:
        description: 'Paste full multi_deployments_json for urgent/hotfix'
        required: false
        default: '{"include": []}'

jobs:
  call-reusable:
    uses: ./.github/workflows/deploy-with-sdlc-governance.yaml
    with:
      environment: uat
      folder_prefix: uat
      values_file_name: values_uat.yaml
      # change_name_override: "Your static name here"   # ← remove this line for auto date
      concurrency_group: uat-deployment
    secrets: inherit
