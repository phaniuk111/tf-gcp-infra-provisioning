name: Deploy with SDLC Governance (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: 'Environment name (uat / prl1 / prd)'
        required: true
        type: string
      folder_prefix:
        description: 'Folder prefix (uat / prl1 / prod)'
        required: true
        type: string
      values_file_name:
        description: 'Values file name from Helm chart'
        required: true
        type: string
      change_name_override:
        description: 'Optional static change_name. Leave empty to auto-generate'
        required: false
        type: string
        default: ''
      upload_blt:
        description: 'Whether to upload BLT (true for uat/prd, false for prl1)'
        required: true
        type: boolean
      concurrency_group:
        description: 'Concurrency group name'
        required: true
        type: string
      manual_multi_deployments_json:
        description: 'Manual JSON payload for workflow_dispatch'
        required: false
        type: string
        default: '{"include": []}'
      runner_group:
        description: 'Runner group name (e.g. uat, dev, prd)'
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  detect-changes:
    runs-on:
      group: ${{ inputs.runner_group }}
    outputs:
      multi_deployments_json: ${{ steps.build-matrix.outputs.multi_deployments_json }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed services and build multi_deployments_json
        id: build-matrix
        run: |
          # Manual trigger (workflow_dispatch)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            MANUAL_JSON="${{ inputs.manual_multi_deployments_json }}"
            if [ -z "$MANUAL_JSON" ]; then
              MANUAL_JSON='{"include": []}'
            fi
            echo "multi_deployments_json=$MANUAL_JSON" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Normal PR flow
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi

          # Safety check
          if [ -z "$BASE_SHA" ] || [ -z "$HEAD_SHA" ]; then
            echo 'multi_deployments_json={"include": []}' >> $GITHUB_OUTPUT
            exit 0
          fi

          PREFIX="${{ inputs.folder_prefix }}"
          CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -E "^${PREFIX}/.*/[^/]+\.yaml$" || true)

          if [ -z "$CHANGED_FILES" ]; then
            echo 'multi_deployments_json={"include": []}' >> $GITHUB_OUTPUT
            exit 0
          fi

          jq -n '{include: []}' > /tmp/deployments.json

          for FILE in $CHANGED_FILES; do
            PREV_VERSION=$(git show "$BASE_SHA":"$FILE" | yq -r '.chart.version // "NONE"' 2>/dev/null || echo "NONE")
            CURR_VERSION=$(yq -r '.chart.version // "NONE"' "$FILE" 2>/dev/null || echo "NONE")

            if [ "$PREV_VERSION" = "$CURR_VERSION" ]; then
              echo "No version change in $FILE → ignoring dummy change"
              continue
            fi

            NAMESPACE=$(echo "$FILE" | cut -d'/' -f2)
            HELM_CHART_NAME=$(yq -r '.chart.name' "$FILE")
            HELM_CHART_VERSION=$(yq -r '.chart.version' "$FILE")

            jq --arg name "$HELM_CHART_NAME" \
               --arg version "$HELM_CHART_VERSION" \
               --arg dir "hlm-all/com/db/eod-ds" \
               --arg values "${{ inputs.values_file_name }}" \
               --arg ns "$NAMESPACE" \
              '.include += [{"helm_chart_name": $name, "helm_chart_version": $version, "helm_chart_dir": $dir, "helm_values_file_name": $values, "gke_namespace": $ns}]' /tmp/deployments.json > /tmp/deployments.json.tmp && mv /tmp/deployments.json.tmp /tmp/deployments.json
          done

          MULTI_JSON=$(jq -c . /tmp/deployments.json)
          echo "multi_deployments_json=$MULTI_JSON" >> $GITHUB_OUTPUT

      - name: Summary of detected changes
        env:
          DETECTED_JSON: ${{ steps.build-matrix.outputs.multi_deployments_json }}
        run: |
          echo "## Detected Deployments" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          COUNT=$(echo "$DETECTED_JSON" | jq '.include | length')
          if [ "$COUNT" -eq 0 ]; then
            echo "No deployments detected. Pipeline will skip deploy job." >> $GITHUB_STEP_SUMMARY
          else
            echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
            echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Helm Chart | Version | Namespace |" >> $GITHUB_STEP_SUMMARY
            echo "|------------|---------|-----------|" >> $GITHUB_STEP_SUMMARY
            echo "$DETECTED_JSON" | jq -r '.include[] | "| \(.helm_chart_name) | \(.helm_chart_version) | \(.gke_namespace) |"' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Raw JSON passed to deploy:**" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            echo "$DETECTED_JSON" | jq '.' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  generate-change-name:
    runs-on:
      group: ${{ inputs.runner_group }}
    outputs:
      change_name: ${{ steps.set-name.outputs.change_name }}
    steps:
      - id: set-name
        run: |
          if [ -n "${{ inputs.change_name_override }}" ]; then
            echo "change_name=${{ inputs.change_name_override }}" >> $GITHUB_OUTPUT
          else
            ENV_UPPER=$(echo "${{ inputs.environment }}" | tr '[:lower:]' '[:upper:]')
            echo "change_name=EOD $(date +%Y.%m.%d) Release - $ENV_UPPER" >> $GITHUB_OUTPUT
          fi

  deploy:
    needs: [detect-changes, generate-change-name]
    if: ${{ fromJSON(needs.detect-changes.outputs.multi_deployments_json).include[0] != null }}
    uses: ug23-eelm/care-workflows/.github/workflows/deploy_with_sdlc_checks_helm.yaml@main
    with:
      upload_blt: ${{ inputs.upload_blt }}
      change_name: ${{ needs.generate-change-name.outputs.change_name }}
      helm_chart_dir: "hlm-all/com/db/eod-ds"
      helm_values_file_name: ${{ inputs.values_file_name }}
      multi_deployments_json: ${{ needs.detect-changes.outputs.multi_deployments_json }}
    secrets: inherit
    concurrency:
      group: ${{ inputs.concurrency_group }}
      cancel-in-progress: false

  notify_on_deployment:
    name: Notify Deployment Status
    needs: [detect-changes, deploy]
    if: always()
    uses: ./.github/workflows/eod_deployment_monitor.yaml
    with:
      env_grade: ${{ inputs.environment }}
      multi_deployments_json: ${{ needs.detect-changes.outputs.multi_deployments_json }}
    secrets: inherit
